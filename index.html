<!DOCTYPE html>
<html>
<head>
    <title>School Registration Form</title>
</head>
<body>
    <link rel="stylesheet" href="form_fill.css".css">

    <h2>Student Data Entry Form</h2>
    <p>Please fill out this form to register for login</p>
    <form action="/submit_school_data" method="POST">
        
        <!-- Personal Information Section -->
        <fieldset>
            <legend>Personal Information</legend>
            
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="fname" required><br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lname" required><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br>
            <input type="radio" id="attack helicopter" name="gender" value="attack helicopter">
            <label for="female">Attack helicopter</label><br><br>

        </fieldset>

        <br>

        <!-- give your academic information here -->
        <!-- Academic Information Section -->
        <fieldset>
            <legend>Academic Information</legend>
            
            <label for="grade">Enrollment Grade:</label><br>
            <select id="grade" name="grade">
                <option value="9">Grade 9</option>
                <option value="10">Grade 10</option>
                <option value="11">Grade 11</option>
                <option value="12">Grade 12</option>
            </select><br><br>

            <label for="student_id">Previous Student ID (if applicable):</label><br>
            <input type="number" id="student_id" name="student_id"><br><br>

            <label>Elective Subjects:</label><br>
            <input type="checkbox" id="art" name="elective" value="art">
            <label for="art">Fine Arts</label><br>
            <input type="checkbox" id="cs" name="elective" value="cs">
            <label for="cs">Computer Science</label><br>
            <input type="checkbox" id="music" name="elective" value="music">
            <label for="music">Music Theory</label><br><br>
        </fieldset>

        <br>

        <!-- Contact & some kind of Additional Details -->
        <fieldset>
            <legend>Contact Details</legend>
            
            <label for="email">Parent/Guardian Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="address">Home Address:</label><br>
            <textarea id="address" name="address" rows="4" cols="30"></textarea><br><br>
        </fieldset>

        <br>

        <!-- Submission Buttons that is used to submit the form -->
        <a href="https://rakshitsirohi737-cmd.github.io/RAKSHIT-SIROHI/">
        <input type="submit" value="Register Student">
        </a>
    
        <input type="reset" value="Clear Form">

    </form>

</body>
</html>
