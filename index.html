<!DOCTYPE html>
<html>
<head>
    <title>LOGIN Form</title>
</head>
<body>
    <link rel="stylesheet" href="style.css".css">

    <h1>USER Entry Form</h1>
    <p>Please fill out this form to register for login</p>
    <form>
        
        <!-- Personal Information Section -->
        <fieldset>
            <legend>Personal Information</legend>
            
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="fname" required><br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lname" ><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br>
            <input type="radio" id="attack helicopter" name="gender" value="attack helicopter">
            <label for="other">other</label><br><br>

        </fieldset>

        <br>

        <!-- give your academic information here -->
        <!-- Academic Information Section -->
        <fieldset>
            <label for="student_id">enter your ID's (if applicable):</label><br>
            <select>
                <option>addhar-card</option>
                <option>pan-card</option>
            </select><br>

            <input type="number" id="student_id" name="enter the no here"><br><br>
            
                
            <label>Your qualification:</label><br>
            <input type="checkbox" id="art" name="elective" value="art">
            <label for="student">student</label><br>
            <input type="checkbox" id="cs" name="elective" value="cs">
            <label for="employe">employe</label><br>
            <input type="checkbox" id="music" name="elective" value="music">
            <label for="other">other</label><br><br>
        </fieldset>

        <br>

        <!-- Contact & some kind of Additional Details -->
        <fieldset>
            <legend>Contact Details</legend>
            
            <label for="email">Enter your email:</label><br>
            <input type="email" id="email" name="email" required><br><br>
            
            <label for="address">Home Address:</label><br>
            <textarea id="address" name="address" rows="4" cols="30"></textarea><br><br>
        </fieldset>

        <br>       
        <!--
        <button onclick="window.location.href="https://rakshitsirohi737-cmd.github.io/RAKSHIT-SIROHI">
        register your account
        </button>
        -->

    <button>register your account</button>
</a>

</body>
</html>
